apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: vote
  name: redis
  labels:
    tier: redis-app
spec:
  replicas: 1
  selector:
    matchLabels:
      tier: redis-app
  template:
    metadata:
      labels:
        tier: redis-app
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        emptyDir: {}
